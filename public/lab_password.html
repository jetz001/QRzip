<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRzip: Password (AES-GCM)</title>
  <link rel="stylesheet" href="lab_shared.css?v=ui1101a81">
</head>
<body>
  <div class="container" id="appContainer">
    <section class="hero">
      <h1>🗜️ แลบวิจัย (Password + AES-GCM)</h1>
      <p>วิเคราะห์ข้อความ บีบอัด แล้วเข้ารหัสด้วยรหัสผ่านก่อนแปลงเป็น QR Code</p>
    </section>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="qrzip_engine.js?v=ui1101a81"></script>
  <script src="lab_shared_ui.js?v=ui1101a81"></script>
  <script>
    injectSharedUI("appContainer");
    
    // Inject custom controls
    document.getElementById("customControlsSlot").innerHTML = `
      <div style="margin-top: 10px;">
        <label>รหัสผ่าน:</label>
        <input type="password" id="passwordInput" value="secret123" placeholder="ตั้งรหัสผ่านสำหรับเปิดอ่าน" style="padding: 8px; border-radius: 4px; border: 1px solid var(--line); background: var(--bg); color: var(--text); margin-left: 8px;"/>
      </div>
    `;

    document.getElementById("qrExtraSlot").innerHTML = `
      <div class="qr-card" style="margin-top:20px; width:100%">
        <h3>ถอดรหัส (Decode)</h3>
        <button id="decodeBtn" class="primary" style="background: var(--good); color: #fff;">ทดสอบถอดรหัส (Decrypt & Decompress)</button>
        <div id="decodeResult" style="margin-top: 16px; background: #020617; padding: 12px; border-radius: 8px; border: 1px solid var(--line); white-space: pre-wrap; font-family: monospace; display:none;"></div>
      </div>
    `;
  </script>
  <script src="lab_shared.js?v=ui1101a81"></script>
  <script>
    // Cryptography Helpers
    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
      );
    }
    async function encryptData(text, password) {
      const enc = new TextEncoder();
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(password, salt);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(text));
      const encryptedArray = new Uint8Array(encrypted);
      const payload = new Uint8Array(salt.length + iv.length + encryptedArray.length);
      payload.set(salt, 0); payload.set(iv, salt.length); payload.set(encryptedArray, salt.length + iv.length);
      return btoa(String.fromCharCode.apply(null, payload));
    }
    async function decryptData(encryptedBase64, password) {
      try {
        const payload = new Uint8Array(atob(encryptedBase64).split('').map(c => c.charCodeAt(0)));
        const salt = payload.slice(0, 16);
        const iv = payload.slice(16, 28);
        const encrypted = payload.slice(28);
        const key = await deriveKey(password, salt);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, encrypted);
        return new TextDecoder().decode(decrypted);
      } catch (e) {
        return null;
      }
    }

    // Override generateQrCode
    const oldGenerateQrCode = generateQrCode;
    generateQrBtn.removeEventListener("click", oldGenerateQrCode);

    generateQrCode = async function() {
      if (!lastBestResult) return;
      
      const pass = document.getElementById("passwordInput").value;
      if(!pass) {
         qrStatus.textContent = "กรุณาใส่รหัสผ่าน";
         return;
      }

      const comparisonResult = getComparisonCompressedResult();
      const compressedPayloadText = comparisonResult.finalPayload || buildCompressedQrPayload(comparisonResult);
      
      // Encrypt the compressed payload!
      const encryptedBase64 = await encryptData(compressedPayloadText, pass);
      
      // Now render
      const encodingMode = qrEncodingSelect?.value || "byte";
      const rawPayload = inputText.value;
      const compressedPayload = encryptedBase64;
      const rawBytes = utf8Bytes(inputText.value);
      const compressedBytes = utf8Bytes(encryptedBase64); // Since it's b64, length matches ascii bytes
      const savedBytes = rawBytes - compressedBytes;

      const rawRender = tryRenderQr(rawQrBox, rawPayload);
      const compressedRender = tryRenderQr(compressedQrBox, compressedPayload);

      rawQrMeta.textContent = rawRender.ok
        ? `payload ${rawBytes.toLocaleString()} bytes | raw${encodingMode === "byte" ? " | byte-mode" : ""}${rawRender.mode === "chunked" ? ` | ${rawRender.chunkCount} QR` : ""}`
        : `payload ${rawBytes.toLocaleString()} bytes | เกินความจุ QR`;
      compressedQrMeta.textContent = compressedRender.ok
        ? `payload ${compressedBytes.toLocaleString()} bytes | AES-GCM${encodingMode === "byte" ? " | byte-mode" : ""}${compressedRender.mode === "chunked" ? ` | ${compressedRender.chunkCount} QR` : ""}`
        : `payload ${compressedBytes.toLocaleString()} bytes | เกินความจุ QR`;
      
      qrPayloadView.textContent = "QR Payload: " + encryptedBase64;
      qrDecodeFlowView.textContent = "Flow: QR -> Base64 Decode -> AES Decrypt -> Decompress";

      const compareText = savedBytes >= 0
        ? `แบบเข้ารหัสเล็กกว่า ${savedBytes.toLocaleString()} bytes`
        : `แบบเข้ารหัสใหญ่กว่า ${Math.abs(savedBytes).toLocaleString()} bytes (เนื่องจาก overhead AES และ Base64)`;
      
      if (rawRender.ok && compressedRender.ok) {
        qrStatus.textContent = `สร้าง QR เข้ารหัสเปรียบเทียบแล้ว | ${compareText}`;
      } else {
        qrStatus.textContent = "สถานะ: QR เกินความจุบางส่วนหรือทั้งหมด";
      }
    };
    
    generateQrBtn.addEventListener("click", generateQrCode);

    document.getElementById('decodeBtn').addEventListener('click', async () => {
      const pass = document.getElementById('passwordInput').value;
      const resDiv = document.getElementById('decodeResult');
      resDiv.style.display = 'block';
      
      const comparisonResult = getComparisonCompressedResult();
      if (!comparisonResult) return;
      
      const compressedPayloadText = comparisonResult.finalPayload || buildCompressedQrPayload(comparisonResult);
      const encryptedBase64 = await encryptData(compressedPayloadText, pass);

      // 1. Decrypt
      const decryptedString = await decryptData(encryptedBase64, pass);
      if (!decryptedString) {
        resDiv.innerHTML = '<span style="color:var(--bad)">❌ รหัสผ่านผิด หรือข้อมูลเสียหาย</span>';
        return;
      }
      
      // 2. Decompress (simplified since we already know it worked to generate it)
      resDiv.innerHTML = '<strong style="color:var(--good)">✅ ถอดรหัสสำเร็จ:</strong> Payload=' + decryptedString + '<br><br>ข้อความเดิม:<br>' + inputText.value;
    });
  </script>
</body>
</html>
