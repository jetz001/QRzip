<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QRZIP Member - Redirecting</title>
  <style>
    :root {
      --brand: #38bdf8;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn.primary {
      background: var(--brand);
      color: #0f172a;
    }
    .btn.primary:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" style="margin-bottom:16px;">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="17 8 12 3 7 8"></polyline>
      <line x1="12" y1="3" x2="12" y2="15"></line>
    </svg>
    <h1 style="font-size:24px; margin-bottom:8px;">ย้ายระบบสมาชิกไปที่หน้าหลักแล้ว</h1>
    <p style="color:var(--muted); margin-bottom:24px;">คุณสามารถสร้าง Member QR ได้จากแท็บ Create QR บนหน้าแรกได้เลย</p>
    <a href="./index.html" class="btn primary">กลับสู่หน้าหลัก</a>
  </div>
  
  <script>
    setTimeout(() => { window.location.href = './index.html'; }, 3000);
  </script>
</body>
</html>
